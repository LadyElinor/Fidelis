name: Fidelis CI

on:
  push:
  pull_request:

jobs:
  seed-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest
      - run: python scripts/verify_sources.py
      - run: python scripts/verify_boundaries.py
      - run: python scripts/run_component_tests.py --profile minimal
      - run: python -m pytest -q integration/tests packages/fidelis-contracts/tests

  all-real-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect imported source manifest
        id: imported
        shell: bash
        run: |
          if [[ -f provenance/imported-sources.tsv ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Require imported source manifest for all-real integration
        if: steps.imported.outputs.present != 'true'
        run: |
          echo "all-real-integration requires provenance/imported-sources.tsv" >&2
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core Python test dependency
        run: python -m pip install pytest
      - name: Hydrate declared source remotes for provenance checks
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          root = Path('.').resolve()
          data = json.loads((root / 'provenance' / 'source-repositories.json').read_text(encoding='utf-8'))
          for source in data['sources']:
              remote = 'source-' + re.sub(r'[^a-z0-9]+', '-', source['name'].lower()).strip('-')
              url = source['url']
              branch = source['branch']
              existing = subprocess.run(['git', 'remote', 'get-url', remote], cwd=root, text=True, capture_output=True)
              if existing.returncode != 0:
                  subprocess.check_call(['git', 'remote', 'add', remote, url], cwd=root)
              subprocess.check_call(['git', 'fetch', '--depth=1', remote, branch], cwd=root)
          PY
      - name: Run all-real component tests
        run: python scripts/run_component_tests.py --profile all-real
      - name: Verify all-real profile
        run: python scripts/verify_profile.py all-real
