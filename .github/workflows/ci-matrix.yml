name: trusted-runtime-ci-matrix

on:
  push:
  pull_request:

jobs:
  stub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install TrustedRuntime
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Health snapshot
        run: trusted-runtime health
      - name: Test suite (stub profile)
        run: pytest -q

  # Partial remains a documented placeholder until sibling integration mounting is automated.
  # Keep that explicit so CI truth surfaces distinguish intent from implementation.
  partial-doc-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Declare partial profile intent
        run: |
          echo "Partial integration profile is documented in docs/CI_INTEGRATION_MATRIX.md"
          echo "This job is a placeholder until sibling integration mounting is automated."

  all-real-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install TrustedRuntime
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Health snapshot
        run: trusted-runtime health
      - name: Live stack smoke truthfulness gate
        run: trusted-runtime live-stack-smoke --input examples/ai_agent_shell_access.json --output .ci-artifacts --require-all-real
      - name: Show truthfulness gate artifact
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('.ci-artifacts/live_stack_smoke.json')
          if not path.exists():
              print('live_stack_smoke.json not produced')
          else:
              payload = json.loads(path.read_text(encoding='utf-8'))
              print(json.dumps(payload.get('smoke_test', {}), indent=2))
          PY
